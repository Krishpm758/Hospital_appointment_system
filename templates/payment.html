{% extends 'base.html' %}
{% load static %}

{% block content %}
<section class="page-title bg-1">
    <div class="overlay"></div>
    <div class="container">
        <div class="row">
            <div class="col-md-12">
                <div class="block text-center">
                    <h1 class="text-capitalize mb-5 text-lg">Confirm Payment</h1>
                    <span class="text-white">Complete your appointment booking</span>
                </div>
            </div>
        </div>
    </div>
</section>

<section class="section contact-info pb-0">
    <div class="container mb-5">
        <div class="row">
            <div class="col-lg-6 offset-lg-3 col-md-12">
                <div class="contact-block mb-4 mb-lg-0 text-center">
                    <h4 class="mb-4">Consultation Fee: ₹ {{ display_amount }}</h4>
                    <p>Please pay the consultation fee to confirm your appointment with {{ appointment.doctor.name }}.
                    </p>

                    <form action="{% url 'patients:payment_success' %}" method="POST">
                        {% csrf_token %}
                        <script src="https://checkout.razorpay.com/v1/checkout.js" data-key="{{ api_key }}"
                            data-amount="{{ amount }}" data-currency="INR" data-order_id="{{ order_id }}"
                            data-name="Hospital Management" data-description="Consultation Fee"
                            data-image="{% static 'images/logo.png' %}" data-prefill.name="{{ appointment.name }}"
                            data-prefill.email="{{ request.user.email }}" data-prefill.contact="{{ appointment.phone }}"
                            data-theme.color="#223a66"></script>
                        <input type="hidden" custom="Hidden Element" name="hidden">
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
